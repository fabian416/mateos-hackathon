name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # --- Frontend (Next.js) ---
  build_frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image tag
        run: echo "IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mateos/frontend" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx Install
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_TAG }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # --- MateOS Agents (single image) ---
  build_agents:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image tag
        run: echo "IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mateos/agents" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx Install
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Agents
        uses: docker/build-push-action@v5
        with:
          context: ./agents
          file: ./agents/Dockerfile
          push: true
          tags: ${{ env.IMAGE_TAG }}:latest
          cache-from: type=gha,scope=mateos-agents
          cache-to: type=gha,mode=max,scope=mateos-agents
