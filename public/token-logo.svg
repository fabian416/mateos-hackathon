<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orbBg" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#8B5CF6" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#06B6D4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#8B5CF6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#08080F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.9"/>
      <stop offset="33%" stop-color="#06B6D4" stop-opacity="0.7"/>
      <stop offset="66%" stop-color="#10B981" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#CBD5E1" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="#08080F"/>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="240" fill="url(#outerGlow)"/>

  <!-- Orb ring with glow -->
  <circle cx="256" cy="256" r="208" fill="none" stroke="url(#ringGrad)" stroke-width="3" filter="url(#glowFilter)"/>

  <!-- Inner orb -->
  <circle cx="256" cy="256" r="176" fill="url(#orbBg)"/>

  <!-- Subtle highlight -->
  <ellipse cx="220" cy="210" rx="80" ry="64" fill="#8B5CF6" opacity="0.12"/>

  <!-- M letter -->
  <text x="256" y="310" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="200" fill="url(#textGrad)" letter-spacing="-8">M</text>
</svg>
