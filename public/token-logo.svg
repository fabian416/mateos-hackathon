<svg width="512" height="512" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#00D1FF"/>
    </radialGradient>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="110" cy="110" r="90" stroke="url(#grad)" stroke-width="4" opacity="0.6"/>

  <!-- Inner core -->
  <circle cx="110" cy="110" r="35" fill="url(#grad)"/>

  <!-- Small agents -->
  <circle cx="110" cy="40" r="6" fill="#7C5CFF"/>
  <circle cx="180" cy="110" r="6" fill="#00D1FF"/>
  <circle cx="110" cy="180" r="6" fill="#7C5CFF"/>
  <circle cx="40" cy="110" r="6" fill="#00D1FF"/>
</svg>
