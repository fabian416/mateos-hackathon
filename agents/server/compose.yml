# === MateOS — Production Stack (EC2) ===
services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    mem_limit: 256m
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  frontend:
    image: ghcr.io/fabian416/mateos-hackathon/frontend:latest
    container_name: frontend
    restart: unless-stopped
    mem_limit: 512m
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mateos-agents:
    image: ghcr.io/fabian416/mateos-hackathon/agents:latest
    container_name: mateos-agents
    restart: unless-stopped
    mem_limit: 4g
    env_file: ./mateos/.env
    environment:
      - NODE_OPTIONS=--max-old-space-size=3072
      - CALENDAR_ID=${CALENDAR_ID:-primary}
      - HOME=/home/agent
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        cp /mnt/entrypoint.sh /tmp/run.sh && chmod +x /tmp/run.sh
        cp /mnt/config/openclaw.json.template /tmp/config/openclaw.json.template
        exec /tmp/run.sh
    volumes:
      # Persistent state (survives recreate)
      - mateos-logs:/home/agent/.openclaw/logs
      - mateos-data:/home/agent/.openclaw/agents
      - mateos-gogcli:/home/agent/.config/gogcli
      - mateos-memory:/home/agent/.openclaw/memory
      - mateos-telegram:/home/agent/.openclaw/telegram
      # Read-only config from host
      - ./mateos/workspaces:/mnt/workspaces:ro
      - ./mateos/docker-entrypoint.sh:/mnt/entrypoint.sh:ro
      - ./mateos/config/openclaw.json.template:/mnt/config/openclaw.json.template:ro
      - ./mateos/agents/main/agent/auth-profiles.json:/mnt/auth-profiles.json:ro
      - ./mateos/tweet-scheduler.py:/mnt/tweet-scheduler.py:ro
      - ./mateos/channel-checker.py:/home/agent/channel-checker.py:ro
      - ./mateos/tweet.py:/home/agent/tweet.py:ro
      - ./mateos/google-service-account.json:/home/agent/.openclaw/credentials/google-service-account.json:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:18789', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  caddy-data:
  caddy-config:
  mateos-logs:
  mateos-data:
  mateos-gogcli:
  mateos-memory:
  mateos-telegram:
