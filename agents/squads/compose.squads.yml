  estancia-meats:
    build:
      context: .
      dockerfile: Dockerfile.squad
      args:
        SQUAD_DIR: estancia-meats
    container_name: squad-estancia-meats
    restart: unless-stopped
    mem_limit: 1g
    environment:
      - SQUAD_NAME=Estancia Meats
      - SQUAD_AGENT_ID=estancia-ceo
