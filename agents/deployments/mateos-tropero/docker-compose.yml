services:
  el-tropero-mateos:
    build:
      context: .
      args:
        AGENT_USER: ${AGENT_USER:-agent}
    container_name: el-tropero-mateos
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot-data:/home/${AGENT_USER:-agent}/.openclaw/logs
      - whatsapp-creds:/home/${AGENT_USER:-agent}/.openclaw/credentials/whatsapp
    healthcheck:
      test: ["CMD", "pgrep", "-f", "openclaw"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  bot-data:
  whatsapp-creds:
